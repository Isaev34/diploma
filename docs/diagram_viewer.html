<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотрщик диаграмм (SVG / HTML)</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
    }

    .toolbar {
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.96);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.8);
    }

    .toolbar label {
      font-size: 14px;
      color: #cbd5f5;
    }

    .toolbar input[type="checkbox"] {
      accent-color: #22c55e;
    }

    .toolbar button {
      padding: 8px 16px;
      background: #22c55e;
      color: #020617;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(15, 118, 110, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    .toolbar button:hover {
      background: #16a34a;
      transform: translateY(-1px);
      box-shadow: 0 20px 40px rgba(22, 163, 74, 0.45);
    }

    .toolbar button.secondary {
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      box-shadow: none;
      border: 1px solid rgba(148, 163, 184, 0.5);
    }

    .toolbar button.secondary:hover {
      background: rgba(15, 23, 42, 1);
      border-color: rgba(249, 250, 251, 0.5);
    }

    .container {
      display: flex;
      height: calc(100vh - 52px);
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.85), #020617 55%, #020617 100%);
    }

    .panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .panel.left {
      border-right: 1px solid rgba(30, 64, 175, 0.5);
    }

    .panel h3 {
      margin: 0;
      padding: 12px 16px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.95);
      color: #e5e7eb;
      border-bottom: 1px solid rgba(30, 64, 175, 0.55);
    }

    .code-wrap {
      flex: 1;
      padding: 12px;
      overflow: auto;
      background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.26), rgba(15, 23, 42, 0.95));
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 200px;
      padding: 12px;
      background: rgba(15, 23, 42, 0.98);
      color: #e5e7eb;
      border: 1px solid rgba(30, 64, 175, 0.6);
      border-radius: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      resize: none;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
    }

    textarea::placeholder {
      color: #64748b;
    }

    .preview-wrap {
      flex: 1;
      padding: 16px;
      overflow: auto;
      background: radial-gradient(circle at top right, rgba(30, 64, 175, 0.24), rgba(15, 23, 42, 0.98));
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 0;
    }

    .preview-wrap iframe {
      border: 1px solid rgba(30, 64, 175, 0.6);
      border-radius: 14px;
      background: #020617;
      min-width: 400px;
      min-height: 300px;
      display: block;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.9);
    }

    .preview-wrap .placeholder {
      color: #9ca3af;
      font-size: 14px;
    }

    .error {
      color: #fca5a5;
      padding: 8px 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" id="btnShow">Показать</button>
    <button type="button" id="btnClear" class="secondary">Очистить</button>
    <button type="button" id="btnOpenInTab" class="secondary">Открыть диаграмму в новой вкладке</button>
    <label><input type="checkbox" id="autoUpdate" checked> Обновлять при вставке</label>
    <label><input type="checkbox" id="fitToContent" checked> Подогнать iframe под содержимое</label>
  </div>
  <div class="container">
    <div class="panel left">
      <h3>Вставьте код SVG или полную HTML-страницу</h3>
      <div class="code-wrap">
        <textarea id="code" placeholder="Вставьте SVG (&lt;svg ...&gt;), полный HTML (&lt;!DOCTYPE html&gt;...) или страницу с IDEF0-диаграммой"></textarea>
      </div>
    </div>
    <div class="panel">
      <h3>Предпросмотр</h3>
      <div class="preview-wrap" id="previewWrap">
        <iframe id="preview" title="Preview" style="display: none;"></iframe>
        <p class="placeholder" id="placeholder">Вставьте код слева и нажмите «Показать»</p>
      </div>
      <div id="error" class="error" style="display: none;"></div>
    </div>
  </div>
  <script>
    const codeEl = document.getElementById('code');
    const preview = document.getElementById('preview');
    const previewWrap = document.getElementById('previewWrap');
    const placeholder = document.getElementById('placeholder');
    const errorEl = document.getElementById('error');
    const btnShow = document.getElementById('btnShow');
    const btnClear = document.getElementById('btnClear');
    const btnOpenInTab = document.getElementById('btnOpenInTab');
    const autoUpdate = document.getElementById('autoUpdate');
    const fitToContent = document.getElementById('fitToContent');

    function resizeIframeToContent() {
      if (!fitToContent.checked) return;
      try {
        const doc = preview.contentDocument;
        if (!doc || !doc.body) return;
        const root = doc.documentElement;
        const w = Math.max(root.scrollWidth, root.offsetWidth, doc.body.scrollWidth || 0);
        const h = Math.max(root.scrollHeight, root.offsetHeight, doc.body.scrollHeight || 0);
        if (w > 0 && h > 0) {
          preview.style.width = w + 'px';
          preview.style.height = h + 'px';
        }
      } catch (e) { /* cross-origin or not loaded */ }
    }

    function showPreview() {
      const raw = codeEl.value.trim();
      errorEl.style.display = 'none';
      if (!raw) {
        preview.style.display = 'none';
        placeholder.style.display = 'block';
        return;
      }
      const rawLower = raw.toLowerCase();
      let htmlToShow = '';
      try {
        if (rawLower.startsWith('<!doctype') || rawLower.startsWith('<html')) {
          htmlToShow = raw;
        } else if (raw.startsWith('<svg') || raw.startsWith('<?xml')) {
          htmlToShow = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:16px;background:#fff;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}</style></head><body>' + raw + '</body></html>';
        } else {
          errorEl.textContent = 'Вставьте SVG (начинается с <svg> или <?xml>) или полный HTML (<!DOCTYPE html> или <html>)';
          errorEl.style.display = 'block';
          placeholder.style.display = 'block';
          preview.style.display = 'none';
          return;
        }
        preview.srcdoc = htmlToShow;
        preview.style.display = 'block';
        placeholder.style.display = 'none';
        preview.onload = function() {
          setTimeout(resizeIframeToContent, 50);
        };
      } catch (e) {
        errorEl.textContent = 'Ошибка: ' + e.message;
        errorEl.style.display = 'block';
        placeholder.style.display = 'block';
        preview.style.display = 'none';
      }
    }

    btnShow.addEventListener('click', showPreview);
    btnClear.addEventListener('click', () => {
      codeEl.value = '';
      preview.srcdoc = '';
      preview.style.display = 'none';
      placeholder.style.display = 'block';
      errorEl.style.display = 'none';
    });

    codeEl.addEventListener('paste', () => {
      if (autoUpdate.checked) setTimeout(showPreview, 50);
    });
    codeEl.addEventListener('input', () => {
      if (autoUpdate.checked) {
        clearTimeout(codeEl._timer);
        codeEl._timer = setTimeout(showPreview, 300);
      }
    });

    fitToContent.addEventListener('change', () => {
      if (fitToContent.checked) {
        resizeIframeToContent();
      } else {
        preview.style.width = (previewWrap.clientWidth - 32) + 'px';
        preview.style.height = (previewWrap.clientHeight - 32) + 'px';
      }
    });

    btnOpenInTab.addEventListener('click', function() {
      const raw = codeEl.value.trim();
      if (!raw) {
        alert('Вставьте код диаграммы слева и нажмите «Показать», затем откройте в новой вкладке.');
        return;
      }
      const rawLower = raw.toLowerCase();
      let htmlToShow = '';
      if (rawLower.startsWith('<!doctype') || rawLower.startsWith('<html')) {
        htmlToShow = raw;
      } else if (raw.startsWith('<svg') || raw.startsWith('<?xml')) {
        htmlToShow = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:16px;background:#fff;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}</style></head><body>' + raw + '</body></html>';
      } else {
        alert('Поддерживаются только SVG или полный HTML.');
        return;
      }
      const blob = new Blob([htmlToShow], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    });
  </script>
</body>
</html>
