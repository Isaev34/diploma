{% extends 'base/base.html' %}

{% block title %}Удалить адрес{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">
                    <i class="fas fa-trash"></i> Удаление адреса
                </h3>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите удалить этот адрес?</p>
                <div class="alert alert-warning">
                    <strong>{{ address.get_full_address }}</strong>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'users:profile' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-times"></i> Отмена
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Удалить адрес
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
