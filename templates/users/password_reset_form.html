{% extends 'base/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center mb-0">Восстановление пароля</h3>
      </div>
      <div class="card-body">
        <p class="small text-muted">Введите e-mail аккаунта — пришлём ссылку для сброса пароля.</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="{{ form.email.id_for_label }}">E-mail</label>
            {{ form.email.errors }}
            {{ form.email }}
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Отправить</button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center">
        <a href="{% url 'users:login' %}">← Вход</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
